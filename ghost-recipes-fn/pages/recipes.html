<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Collection — Ghost Recipes</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="masthead">
  <div class="masthead-top">
    <a class="logo-wrap" href="../index.html">
      <span class="logo-ghost">Ghost</span>
      <span class="logo-recipes">Recipes</span>
    </a>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search 312 underground recipes…">
    </div>
    <nav class="masthead-links">
      <a href="../index.html">Home</a>
      <a href="recipes.html" class="active">Collection</a>
      <a href="admin.html">Admin</a>
    </nav>
  </div>
  <div class="category-nav">
    <button class="cat-btn active" data-cat="all">All</button>
    <button class="cat-btn" data-cat="street">Street Food</button>
    <button class="cat-btn" data-cat="comfort">Comfort</button>
    <button class="cat-btn" data-cat="quick">Under 30 Min</button>
    <button class="cat-btn" data-cat="slow">Low &amp; Slow</button>
    <button class="cat-btn" data-cat="vegetarian">Vegetarian</button>
    <button class="cat-btn" data-cat="soups">Soups &amp; Stews</button>
    <button class="cat-btn" data-cat="fermented">Fermented</button>
  </div>
</header>

<div class="section-head">
  <h2 class="section-title">The Archive</h2>
  <span id="recipeCount" style="font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;color:var(--text3)"></span>
</div>

<div class="card-grid" id="collectionGrid">
  <div class="empty-state">Loading recipes…</div>
</div>

<footer>
  <span>Ghost Recipes &nbsp;·&nbsp; No dining room required</span>
  <span>Dispatches from the unseen kitchen &nbsp;·&nbsp; © 2025</span>
</footer>

<script src="../js/data.js"></script>
<script src="../js/recipes.js"></script>
</body>
</html>
