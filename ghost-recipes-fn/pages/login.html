<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Ghost Recipes</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-ghost" style="font-size:2rem">Ghost</span>
      <br>
      <span class="logo-recipes" style="font-size:.5rem;letter-spacing:.25em">Recipes</span>
    </div>

    <p class="login-eyebrow">Admin Access</p>

    <div class="login-error" id="loginError">Incorrect password. Try again.</div>

    <form id="loginForm">
      <div class="form-group" style="margin-bottom:1rem">
        <label class="form-label" for="passwordInput">Password</label>
        <input class="form-input" type="password" id="passwordInput" placeholder="Enter admin password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
        Enter the Kitchen →
      </button>
    </form>

    <hr class="login-divider">

    <p style="font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;color:var(--text3);text-align:center">
      <a href="../index.html" style="color:var(--text3);border-bottom:1px solid var(--border2)">← Back to Ghost Recipes</a>
    </p>
  </div>
</div>

<script src="../js/data.js"></script>
<script>
  // Redirect if already logged in
  if (Store.isLoggedIn()) window.location = "admin.html";

  document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    const pass = document.getElementById("passwordInput").value;
    if (Store.login(pass)) {
      window.location = "admin.html";
    } else {
      document.getElementById("loginError").classList.add("show");
      document.getElementById("passwordInput").value = "";
      document.getElementById("passwordInput").focus();
    }
  });
</script>
</body>
</html>
